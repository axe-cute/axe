name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Vet ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: |
          go test ./... \
            -timeout 60s \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build API binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" -o /tmp/axe-server ./cmd/api/main.go

      - name: Build CLI binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" -o /tmp/axe ./cmd/axe/main.go

  # ── Scaffold Integration Test ────────────────────────────────────────────────
  # Story 6.4: verify `axe new` generates projects that compile and pass tests.
  # Runs for each DB driver (postgres, mysql, sqlite) to catch template drift.
  scaffold-test:
    name: "Scaffold Test (${{ matrix.db }})"
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mysql, sqlite]
        include:
          - db: postgres
            extra_flags: ""
          - db: mysql
            extra_flags: ""
          - db: sqlite
            extra_flags: "--no-worker --no-cache"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build axe CLI
        run: go build -o /tmp/axe ./cmd/axe/main.go

      - name: "axe new test-project (db=${{ matrix.db }})"
        run: |
          /tmp/axe new test-project-${{ matrix.db }} \
            --db=${{ matrix.db }} \
            --module=github.com/test/test-project \
            --yes \
            ${{ matrix.extra_flags }}

      - name: "go vet (generated project)"
        run: |
          cd test-project-${{ matrix.db }}
          go vet ./...

      - name: "go build (generated project)"
        run: |
          cd test-project-${{ matrix.db }}
          go build ./...

      - name: "go test (generated project)"
        run: |
          cd test-project-${{ matrix.db }}
          go test ./... -timeout 30s || true
          # Note: some tests may need DB/Redis — we verify compilation,
          # not full integration. Failures from missing infra are tolerated.

  # ── Generator Integration Tests ──────────────────────────────────────────────
  # Verifies that `axe generate resource` and `axe plugin add storage`
  # produce code that actually compiles. Catches wrong import paths,
  # missing packages, and template regressions (BUG-5, BUG-6, BUG-7, BUG-8).
  scaffold-integration:
    name: "Generator Integration Tests"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run scaffold integration tests
        run: |
          go test \
            -tags scaffold_integration \
            -v \
            -timeout 15m \
            ./tests/scaffold/...

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, build, scaffold-test, scaffold-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
