        title: "Storage: wrap FUSE errors → AppError"
        status: done
        sprint: 21
        priority: P1
        notes: |
          Added wrapFSError(op, err) in fs_store.go.
          Handles ENOTCONN, EIO (mount unavailable), EROFS (read-only), ENOSPC (quota), EACCES/EPERM (permissions).
          Applied to Delete, Open, fsync call. Prevents raw syscall messages leaking to HTTP clients.
          11 new tests added to storage_test.go.
