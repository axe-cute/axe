  - sprint: 19-20
    goal: "Plugin System + Storage + Security Hardening + CI scaffold test"
    status: done
    highlights: "plugin.App lifecycle, FSStore, JWT auth on storage, ci.yml scaffold-test"

  - sprint: 21
    goal: "Storage hardening (fsync, health-check, FUSE errors) + Email plugin + ADR-010"
    status: done
