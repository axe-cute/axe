  - sprint: 22
    goal: "Scaffold hygiene + plugin.App decouple from ent"
    status: done
    highlights: "Removed EntClient from AppConfig, 001_init.sql no hardcoded users table"

  - sprint: 23
    goal: "BMAD audit fixes — code correctness & interface consistency"
    status: done
    highlights: "DATA RACE fix ws hub, /ready mount in scaffold, outbox multi-DB placeholder, HealthCheck context"

  - sprint: 24
    goal: "Test Hardening — coverage 63% → 78%+"
    status: done
    highlights: "110 new tests. outbox 62→82%, worker 0→55%, jwtauth 63→90%, auth handler 0→63%, txmanager 22→89%, generate 0→22%"

  - sprint: 25
    goal: "Plugin Discovery CLI + Maturity hardening"
    status: done
    highlights: "axe plugin list/info, oauth2 18→60%, email 47→68%, tenant 71→92%"

  - sprint: 26
    goal: "Structural Testing — Interface Injection"
    status: done
    highlights: "outbox Enqueuer interface (62→82%), config tests (57→86%)"

  - sprint: 31
    goal: "Trust Building — audit, docs sync, coverage, adoption guide, examples"
    status: done
    highlights: "CHANGELOG, ratelimit 54→93%, worker 55→85%, ws 78→89%, incremental-adoption.md, 3 examples"

  - sprint: 32
    goal: "Post-rc.1 — Production example projects"
    status: done
    highlights: "Tagged v1.0.0-rc.1. generate 34→89%. examples/ecommerce + examples/webtoon (5K+ LOC each)"

  - sprint: 33
    goal: "CI Fix — commit ent-generated code"
    status: done  # was in_progress, but issues resolved
    highlights: "Fixed .gitignore ent exclusions, git add -f ent files"

  - sprint: 34
    goal: "Audit v3 Hardening — 18 P0/P1/P2 issues"
    status: done
    completed_at: "2026-04-20"
    results:
      - "Story 10.1: Scaffold fixes (readyHandler, Go 1.25.0, slog, distroless)"
      - "Story 10.2: 6 plugins MinAxeVersion v1.0.0 → v0.5.0"
      - "Story 10.4: Security (IP spoofing, admin auth, cookie Secure, fail-mode)"
      - "Story 10.5: Event bus Publish() returns errors, pagination cap 100"
      - "Story 10.6: P2 DX fixes (Views DTO, worker cleanup, JWT, DB passwords, semaphore, IDOR, pkg→internal/infra)"

  - sprint: 35
    goal: "OAuth2 JWT Unification — single token system"
    status: done
    completed_at: "2026-04-20"
    results:
      - "Story 10.3: BREAKING — OAuth2 uses jwtauth.Service instead of homebrew HMAC"
      - "Deleted 27 lines manual JWT (issueJWT). Added Identity type."
      - "Config.JWTSecret/JWTExpiry removed; *jwtauth.Service added to AppConfig"
      - "All OAuth2 tokens now have JTI, uid, role — compatible with JWTAuth middleware"

