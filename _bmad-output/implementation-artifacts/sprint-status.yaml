    title: "Production Hardening"
    status: done
    completed_at: "2026-04-15"
    stories:
      - { id: story-3.1, title: "Observability — Structured Logging",       status: done, sprint: 7 }
      - { id: story-3.2, title: "Observability — Prometheus Metrics",       status: done, sprint: 7 }
      - { id: story-3.3, title: "Redis Cache Layer (pkg/cache)",            status: done, sprint: 8 }
      - { id: story-3.4, title: "JWT Auth + RBAC (pkg/jwtauth + middleware)", status: done, sprint: 8 }
      - { id: story-3.5, title: "Background Jobs — Asynq + Outbox Poller", status: done, sprint: 9 }
      - { id: story-3.6, title: "Docker Multi-stage + GitHub Actions CI/CD", status: done, sprint: 9 }

  - id: epic-4
    title: "Quality & API Polish"
    status: in_progress
    stories:
      - id: story-4.1
        title: "Integration Tests — Testcontainers (real DB)"
        status: in_progress
        sprint: 10
        priority: P0
        acceptance_criteria:
          - "go test ./... -tags=integration passes with real PostgreSQL"
          - "TestCreateUser_Integration: POST /users → verify in DB"
          - "TestLogin_Integration: login → get token → GET /auth/me"
          - "TestMigrate_Integration: all migrations apply cleanly"

      - id: story-4.2
        title: "JWT Logout — JTI + Redis Blocklist"
        status: todo
        sprint: 10
        priority: P0
        acceptance_criteria:
          - "POST /auth/logout with valid JWT → token JTI added to Redis"
          - "Subsequent requests with same token → 401 token_revoked"
          - "JTI blocklist key expires when token expires (no leak)"
          - "Unit tests: blocked/unblocked token scenarios"

      - id: story-4.3
        title: "Rate Limiting Middleware"
        status: todo
        sprint: 11
        priority: P1
        acceptance_criteria:
          - "Global: 100 req/min per IP"
          - "Auth routes: 10 req/min per IP (anti-brute-force)"
          - "429 Too Many Requests with Retry-After header"
          - "Backed by Redis sliding window"

      - id: story-4.4
        title: "OpenAPI 3.1 Spec + Swagger UI"
        status: todo
        sprint: 11
        priority: P1
        acceptance_criteria:
          - "GET /docs → Swagger UI served"
          - "GET /openapi.yaml → machine-readable spec"
          - "All endpoints documented with request/response schemas"
          - "Bearer auth scheme defined"

      - id: story-4.5
        title: "axe generate resource — Struct Tags + --with-auth flag"
        status: todo
        sprint: 12
        priority: P2
        acceptance_criteria:
          - "Generated Go structs have json struct tags"
          - "--with-auth auto-adds JWTAuth middleware to routes"
          - "--admin-only wraps routes with RequireRole(admin)"

