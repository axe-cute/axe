run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/axe-cute/axe

  staticcheck:
    checks:
      - "all"
      - "-SA1019"  # Ignore deprecated — nhooyr.io/websocket migration is tracked separately

  revive:
    rules:
      - name: exported
        arguments:
          - "disableStutteringCheck"

issues:
  exclude-rules:
    # Allow test files to skip errcheck (common pattern in test assertions)
    - path: "_test\\.go"
      linters: [errcheck]
    # Allow test files to use string context keys and unused assignments
    - path: "_test\\.go"
      text: "SA1029|SA4006"
    # Template files contain raw string literals, not real Go code
    - path: "cmd/axe/generate/templates.go"
      linters: [errcheck, govet, unused, ineffassign, staticcheck, goimports, revive]
    - path: "cmd/axe/new/templates.go"
      linters: [errcheck, govet, unused, ineffassign, staticcheck, goimports, revive]

  exclude-dirs:
    - ent
