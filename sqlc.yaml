version: "2"
sql:
  - engine: postgresql
    queries: "./db/queries"
    schema: "./db/schema.sql"
    gen:
      go:
        package: "sqlcdb"
        out: "./internal/repository/sqlcdb"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
